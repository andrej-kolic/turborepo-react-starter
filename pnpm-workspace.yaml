packages:
  - apps/*
  - packages/*
  - infra/*

catalog:
  # React ecosystem
  react: 19.2.6
  react-dom: 19.2.6
  '@types/react': 19.2.15
  '@types/react-dom': 19.2.3

  # Node
  '@types/node': '24.6.2'

  # Build tools
  vite: '8.0.14'
  ts-node: '10.9.2'
  serve: 14.2.6
  '@turbo/gen': 2.9.15

  # Testing
  vitest: '4.1.7'
  jsdom: 29.1.1
  '@testing-library/dom': '10.4.1'
  '@testing-library/jest-dom': '6.9.1'
  '@testing-library/react': 16.3.2
  '@testing-library/user-event': '14.6.1'

allowBuilds:
  '@parcel/watcher': true
  esbuild: true
  netlify-cli: true
  sharp: true
  unix-dgram: true
  unrs-resolver: true

onlyBuiltDependencies:
  - '@parcel/watcher'
  - core-js-pure
  - esbuild
  - netlify-cli
  - sharp
  - unix-dgram
  - unrs-resolver
