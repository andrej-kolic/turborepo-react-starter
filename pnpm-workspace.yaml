packages:
  - apps/*
  - packages/*
  - infra/*

catalog:
  # React ecosystem
  react: 19.2.7
  react-dom: 19.2.7
  '@types/react': 19.2.17
  '@types/react-dom': 19.2.3

  # Node
  '@types/node': '24.6.2'

  # Build tools
  vite: 8.0.16
  tsx: '4.22.4'
  serve: 14.2.6
  '@turbo/gen': 2.9.18

  # Browser capture
  playwright-core: 1.61.0

  # Testing
  vitest: 4.1.9
  jsdom: 29.1.1
  '@testing-library/dom': '10.4.1'
  '@testing-library/jest-dom': '6.9.1'
  '@testing-library/react': 16.3.2
  '@testing-library/user-event': '14.6.1'

allowBuilds:
  '@parcel/watcher': true
  '@typescript/native-preview': true
  esbuild: true
  netlify-cli: true
  sharp: true
  tldjs: true
  unix-dgram: false
  unrs-resolver: true

onlyBuiltDependencies:
  - '@parcel/watcher'
  - '@typescript/native-preview'
  - core-js-pure
  - esbuild
  - netlify-cli
  - sharp
  - unrs-resolver

minimumReleaseAgeExclude:
  - '@typescript/native-preview-darwin-arm64@7.0.0-dev.20260527.2'
  - '@typescript/native-preview-darwin-x64@7.0.0-dev.20260527.2'
  - '@typescript/native-preview-linux-arm64@7.0.0-dev.20260527.2'
  - '@typescript/native-preview-linux-arm@7.0.0-dev.20260527.2'
  - '@typescript/native-preview-linux-x64@7.0.0-dev.20260527.2'
  - '@typescript/native-preview-win32-arm64@7.0.0-dev.20260527.2'
  - '@typescript/native-preview-win32-x64@7.0.0-dev.20260527.2'
  - '@typescript/native-preview@7.0.0-dev.20260527.2'
  - rulesync@8.29.0
