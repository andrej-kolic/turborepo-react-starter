# Headless smoke test — verify tier with optional capture on failure.
# Validates the live app renders a key page region; not a replacement for unit tests.
# On smoke failure, record-trace captures HAR + Playwright trace + console for debugging.
# Separate from capture-devtools.yml (on-demand capture) and build-auto.yaml (lint/test/build).
#
# Matrix: all bundler apps. Port/URL derived via dev-tools-app-target → app-port.ts.

name: 'Verify: Browser smoke'

on:
  pull_request:
  workflow_dispatch:

env:
  HUSKY: 0
  BUILD_ENVIRONMENT: development
  CHROME_HEADLESS: 'true'
  CHROME_DEBUG_PORT: 9222

jobs:
  smoke:
    name: Live app smoke (${{ matrix.bundler }})
    timeout-minutes: 15
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        bundler: [app-vite, app-webpack, app-esbuild]

    env:
      BUNDLER: ${{ matrix.bundler }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js (with pnpm cache)
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Ensure dev app is running
        run: pnpm browser:ensure-app -- --log-file /tmp/dev-app.log

      - name: Setup Chrome (headless)
        run: pnpm browser:setup

      - name: Assert app header renders
        run: |
          if ! pnpm browser validate \
            --selector "[data-testid=app-header]" \
            --no-console-errors; then
            echo "--- dev-app.log ---"
            cat /tmp/dev-app.log || true
            exit 1
          fi

      - name: Capture trace on smoke failure
        if: failure()
        run: |
          pnpm capture record-trace --duration 5
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}

      - name: Upload capture artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: smoke-failure-trace-${{ matrix.bundler }}-${{ github.run_id }}
          path: packages/browser-capture/artifacts/**
          retention-days: 30
          if-no-files-found: ignore

      - name: Cleanup
        if: always()
        run: |
          pnpm chrome:debug --stop || true
          if APP_PORT=$(pnpm exec dev-tools-app-target port); then
            lsof -ti:"$APP_PORT" | xargs -r kill 2>/dev/null || true
          fi
