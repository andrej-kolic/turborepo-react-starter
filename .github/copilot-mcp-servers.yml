# MCP server configuration for Copilot
# Defines a Storybook server that Copilot agents can start and interact with.
servers:
  - id: storybook
    name: Storybook
    description: >
      Starts Storybook dev for ui-storybook. Dev port is apps/ui-storybook/package.json
      devPort (SSOT). Resolve via loadStorybookEndpoints() or storybookCanvasUrl() in
      packages/dev-tools/config/app-port.js — same pattern as bundler dev ports.
      Canvas URL for browser CLI: storybookCanvasUrl('<story-id>').
    # Command used to start the dev server. Uses pnpm workspace filter to scope to the package.
    start:
      command: 'pnpm --filter ui-storybook dev'
      env:
        NODE_ENV: development
    # Optional build command for static Storybook output
    build:
      command: 'pnpm --filter ui-storybook build'
    # Command to preview built static Storybook
    preview:
      command: 'pnpm --filter ui-storybook preview'
