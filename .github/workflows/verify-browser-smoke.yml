# Multi-bundler dev-server boot smoke — HTTP 200 only.
# Region assertions live in Playwright E2E (verify-e2e.yml, DEFAULT_BUNDLER preview).
#
# Matrix: all bundler apps. Port/URL derived via dev-tools-app-target → app-port.ts.

name: 'Verify: Browser smoke'

on:
  pull_request:
  workflow_dispatch:

env:
  HUSKY: 0
  BUILD_ENVIRONMENT: development

jobs:
  smoke:
    name: Dev server boot (${{ matrix.bundler }})
    timeout-minutes: 15
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        bundler: [app-vite, app-webpack, app-esbuild]

    env:
      BUNDLER: ${{ matrix.bundler }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js (with pnpm cache)
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Ensure dev app is running
        run: pnpm browser:ensure-app -- --log-file /tmp/dev-app.log

      - name: Assert HTTP 200
        run: |
          APP_URL=$(pnpm exec dev-tools-app-target url)
          http_code=$(curl -s -o /dev/null -w "%{http_code}" "$APP_URL")
          if [ "$http_code" != "200" ]; then
            echo "Expected HTTP 200 from ${APP_URL}, got ${http_code}"
            echo "--- dev-app.log ---"
            cat /tmp/dev-app.log || true
            exit 1
          fi

      - name: Cleanup
        if: always()
        run: |
          if APP_PORT=$(pnpm exec dev-tools-app-target port); then
            lsof -ti:"$APP_PORT" | xargs -r kill 2>/dev/null || true
          fi
