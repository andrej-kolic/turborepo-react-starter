name: 'Capture: DevTools'

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'App URL to trace (defaults to local dev app)'
        required: false
  issue_comment:
    types: [created]

# issue_comment on PRs needs issues:write and pull-requests:write to reply on the thread.
permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  # ─── Main capture job ────────────────────────────────────────────────────────
  capture:
    name: Capture DevTools artifacts
    timeout-minutes: 15
    runs-on: ubuntu-latest

    env:
      HUSKY: 0
      BUILD_ENVIRONMENT: development
      CHROME_HEADLESS: 'true'
      CHROME_DEBUG_PORT: 9222
      BUNDLER: app-vite

    # Only run on manual dispatch or when a PR collaborator comments /capture-trace
    if: |
      github.event_name == 'workflow_dispatch' ||
      (
        contains(github.event.comment.body, '/capture-trace') &&
        contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)
      )

    # Expose step outputs for the ops summary and PR comment
    outputs:
      capture_duration_ms: ${{ steps.capture.outputs.capture_duration_ms }}
      artifact_size_bytes: ${{ steps.artifact-size.outputs.artifact_size_bytes }}

    steps:
      # ── Checkout ─────────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v6

      # ── pnpm + Node setup with dependency cache ───────────────────────────────
      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js (with pnpm cache)
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve trace URL
        id: trace-url
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          URL=""
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.url }}" ]; then
            URL="${{ inputs.url }}"
          elif [ "${{ github.event_name }}" = "issue_comment" ] && [ -n "$COMMENT_BODY" ]; then
            URL=$(printf '%s\n' "$COMMENT_BODY" | grep -oE 'https?://[^[:space:>)]+' | head -1 || true)
          fi
          echo "url=${URL}" >> "$GITHUB_OUTPUT"
          if [ -n "$URL" ]; then
            echo "Trace target: ${URL}"
          else
            echo "Trace target: local dev app"
          fi

      - name: Ensure dev app is running
        if: steps.trace-url.outputs.url == ''
        run: pnpm browser:ensure-app -- --log-file /tmp/dev-app.log

      - name: Setup Chrome (headless)
        run: |
          if [ -n "${{ steps.trace-url.outputs.url }}" ]; then
            pnpm browser:setup -- --url "${{ steps.trace-url.outputs.url }}"
          else
            pnpm browser:setup
          fi

      - name: Record trace
        id: capture
        run: |
          CAPTURE_START_MS=$(date +%s%3N)
          if [ -n "${{ steps.trace-url.outputs.url }}" ]; then
            APP_URL="${{ steps.trace-url.outputs.url }}"
          else
            APP_URL=$(pnpm exec dev-tools-app-target url)
          fi
          node packages/browser-capture/bin/copilot-devtools.js record-trace "$APP_URL" --duration 5
          CAPTURE_END_MS=$(date +%s%3N)
          DURATION_MS=$((CAPTURE_END_MS - CAPTURE_START_MS))
          echo "Trace recorded in ${DURATION_MS}ms (${APP_URL})"
          echo "capture_duration_ms=${DURATION_MS}" >> "$GITHUB_OUTPUT"
          echo "app_url=${APP_URL}" >> "$GITHUB_OUTPUT"
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}

      # ── Upload artifacts ──────────────────────────────────────────────────────
      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: devtools-artifacts-${{ github.run_id }}
          path: packages/browser-capture/artifacts/**
          retention-days: 30
          if-no-files-found: ignore

      # ── Measure artifact size ─────────────────────────────────────────────────
      - name: Compute artifact size
        id: artifact-size
        run: |
          SIZE_BYTES=$(du -sb packages/browser-capture/artifacts/ | cut -f1)
          echo "Artifact directory size: ${SIZE_BYTES} bytes"
          echo "artifact_size_bytes=${SIZE_BYTES}" >> "$GITHUB_OUTPUT"

      - name: Cleanup
        if: always()
        run: |
          pnpm chrome:debug --stop || true
          if APP_PORT=$(pnpm exec dev-tools-app-target port); then
            lsof -ti:"$APP_PORT" | xargs -r kill 2>/dev/null || true
          fi

      # ── Job Summary (ops metrics) ─────────────────────────────────────────────
      - name: Write ops summary
        if: always()
        run: |
          CAPTURE="${{ steps.capture.outputs.capture_duration_ms }}"
          TRACE_URL="${{ steps.capture.outputs.app_url }}"
          SIZE="${{ steps.artifact-size.outputs.artifact_size_bytes }}"
          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"

          # Human-readable size
          if [ -n "$SIZE" ] && [ "$SIZE" -gt 0 ] 2>/dev/null; then
            SIZE_KB=$(echo "scale=1; $SIZE / 1024" | bc)
            SIZE_HUMAN="${SIZE_KB} KB"
          else
            SIZE_HUMAN="n/a"
          fi

          cat >> "$GITHUB_STEP_SUMMARY" << EOF
          ## 🔍 DevTools Capture — Ops Report

          | Metric | Value |
          |--------|-------|
          | Run ID | [\`${GITHUB_RUN_ID}\`](${RUN_URL}) |
          | Actor | \`${{ github.actor }}\` |
          | Trigger | \`${{ github.event_name }}\` |
          | Branch | \`${{ github.ref_name }}\` |
          | Trace URL | ${TRACE_URL:-local dev app} |
          | Capture duration | ${CAPTURE:-n/a} ms |
          | Artifact size | ${SIZE_HUMAN} (${SIZE:-n/a} bytes) |
          | Retention | 30 days |

          Artifacts: [Download from run page](${RUN_URL})
          EOF

      # ── Comment on PR with run link + metrics ─────────────────────────────────
      - name: Comment on PR with run link
        if: ${{ github.event_name == 'issue_comment' && contains(github.event.comment.body, '/capture-trace') }}
        uses: actions/github-script@v9
        env:
          CAPTURE_DURATION_MS: ${{ steps.capture.outputs.capture_duration_ms }}
          TRACE_URL: ${{ steps.capture.outputs.app_url }}
          ARTIFACT_SIZE_BYTES: ${{ steps.artifact-size.outputs.artifact_size_bytes }}
        with:
          script: |
            const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;
            const sizeKb = process.env.ARTIFACT_SIZE_BYTES
              ? (Number(process.env.ARTIFACT_SIZE_BYTES) / 1024).toFixed(1) + ' KB'
              : 'n/a';
            const body = [
              '## ✅ DevTools capture complete',
              '',
              '| Metric | Value |',
              '|--------|-------|',
              `| Trace URL | ${process.env.TRACE_URL ?? 'local dev app'} |`,
              `| Capture duration | ${process.env.CAPTURE_DURATION_MS ?? 'n/a'} ms |`,
              `| Artifact size | ${sizeKb} |`,
              `| Retention | 30 days |`,
              '',
              `Artifacts are attached to this workflow run: ${runUrl}`,
              '',
              'Files: `metadata.json`, `har.json`, `trace.zip`, `console.json`, `performance.json`',
              'View trace locally: `npx playwright show-trace trace-*/trace.zip`',
            ].join('\n');
            const issue_number = context.payload.issue.number;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue_number,
              body,
            });

  # ─── Failure alert job ───────────────────────────────────────────────────────
  alert-on-failure:
    name: Alert on capture failure
    runs-on: ubuntu-latest
    needs: capture
    if: failure()

    steps:
      - name: Post failure summary
        uses: actions/github-script@v9
        with:
          script: |
            const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;
            await core.summary
              .addHeading('❌ DevTools capture failed')
              .addRaw(`The \`capture-devtools.yml\` capture job failed for run [\`${process.env.GITHUB_RUN_ID}\`](${runUrl}).`)
              .addBreak()
              .addRaw(`**Trigger:** \`${{ github.event_name }}\` | **Actor:** \`${{ github.actor }}\``)
              .addBreak()
              .addRaw(`Check the [run logs](${runUrl}) for details.`)
              .write();

      - name: Comment failure on PR
        if: ${{ github.event_name == 'issue_comment' && contains(github.event.comment.body, '/capture-trace') }}
        uses: actions/github-script@v9
        with:
          script: |
            const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;
            const issue_number = context.payload.issue.number;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue_number,
              body: `## ❌ DevTools capture failed\n\nThe capture job encountered an error. Check the [run logs](${runUrl}) for details.\n\n**Run ID:** \`${process.env.GITHUB_RUN_ID}\``,
            });
